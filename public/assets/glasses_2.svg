<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Left lens -->
  <rect x="29" y="30" width="16" height="14" rx="2" stroke="#555" stroke-width="2" fill="rgba(200,180,255,0.2)"/>
  <!-- Right lens -->
  <rect x="55" y="30" width="16" height="14" rx="2" stroke="#555" stroke-width="2" fill="rgba(255,180,200,0.2)"/>
  <!-- Bridge -->
  <line x1="45" y1="37" x2="55" y2="37" stroke="#555" stroke-width="1.5"/>
  <!-- Arms -->
  <line x1="29" y1="35" x2="24" y2="34" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="71" y1="35" x2="76" y2="34" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
</svg>
